version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_USER=skillbridge_user
      - DB_PASS=skillbridge_pass
      - DB_NAME=skillbridge_db
    depends_on:
      - db
    volumes:
      # Mount the local directory to the container so you can edit code without rebuilding
      - .:/var/www/html/1stProject

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=skillbridge_db
      - MYSQL_USER=skillbridge_user
      - MYSQL_PASSWORD=skillbridge_pass
    volumes:
      - db_data:/var/lib/mysql
      # Automatically import the schema when the container starts for the first time
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
